---
version: "3"
services:
 devopsdb:
   image: Avinash0981929/automation:db
   ports:
     - "3306:3306"
   deploy:
     replicas: 3
   networks:
     - mynetwork

 application:
   image: Avinash0981929/automation:app
   ports:
     - "1111:8080"
   deploy:
     replicas: 3
   depends_on:
       - "devopsdb"
   networks:
     - mynetwork
networks:
  mynetwork:
    driver: overlay
